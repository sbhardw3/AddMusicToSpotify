<!DOCTYPE html>
<html>
<head>
    <title>Songs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loading-text">Transferring songs...</p>
</div>

<div class="container">
    <h1>Songs in Playlist</h1>

    <div class="summary-bar">
        <div class="summary-card">
            <span class="summary-number">{{ songs|length }}</span>
            <span class="summary-label">Songs Found</span>
        </div>
    </div>

    <table class="song-table">
        <thead>
            <tr>
                <th>YouTube Title</th>
            </tr>
        </thead>
        <tbody>
            {% for song in songs %}
            <tr>
                <td>{{ song.title }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="buttons">
        <form action="/transfer_playlist" method="post" class="transfer-form" style="display:inline;">
            <input type="hidden" name="playlist_id" value="{{ playlist_id }}">
            <button type="submit" class="playlist-btn">Transfer Songs</button>
        </form>

        <a href="/" class="playlist-btn back-btn">Back to Home</a>
    </div>
</div>

<script>
    const transferForm = document.querySelector(".transfer-form");
    const overlay = document.getElementById("loading-overlay");
    const loadingText = document.getElementById("loading-text");

    if (transferForm) {
        transferForm.addEventListener("submit", function() {
            overlay.classList.remove("hidden");
            loadingText.textContent = "Matching songs and creating playlist...";
            const button = transferForm.querySelector("button");
            button.disabled = true;
            button.textContent = "Transferring...";
        });
    }
</script>
</body>
</html>
